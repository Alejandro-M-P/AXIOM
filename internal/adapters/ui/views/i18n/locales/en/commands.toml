[rebuild]
title = "Rebuild Base Image"
subtitle = "The current image will be deleted and a new build will be launched."
footer = "Existing bunkers will NOT be affected."

[prune]
title = "Clean Orphan Environments"
subtitle = "Directories were detected in .entorno/ without an associated container."
footer = "Do you want to delete them to free up space?"

[info]
title = "Bunker Information"
subtitle = "Detailed technical sheet"
footer = "Use axiom delete to delete or axiom create to enter."

[help]
title = "AXIOM Help"
subtitle = "Available bunker commands."
footer = "axiom list already shows status, base image, GPU and key paths for each bunker."
item_1 = "If you don't pass a name in axiom delete, a selector with arrows opens."
item_2 = "When deleting a bunker you can decide if the project code is also deleted."
cmd_1 = "axiom build:Builds the base image with GPU and AI tools."
cmd_2 = "axiom list:Opens a selector with search and shows the bunker's sheet."
cmd_3 = "axiom create <name>:Creates a new bunker or enters an existing one."
cmd_4 = "axiom stop:Opens the active bunkers selector and stops the one you choose."
cmd_5 = "axiom delete:Opens the bunkers selector and deletes the one you choose."
cmd_6 = "axiom delete-image:Deletes the active base image."
cmd_7 = "axiom info:Shows the detailed sheet of a bunker."
cmd_8 = "axiom prune:Cleans orphan environments without a container."
cmd_9 = "axiom rebuild:Rebuilds the base image."
cmd_10 = "axiom reset:Deletes ALL bunkers and images."