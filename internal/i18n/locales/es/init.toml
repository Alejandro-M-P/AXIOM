[init_auth_mode]
title = "AUTENTICACIÓN"
description = "Selecciona tipo de conexión:"
option_ssh = "SSH (Recomendado)"
option_https = "HTTPS (Token)"

[init_github_token]
title = "TOKEN GITHUB"
description = "Pega tu token PAT:"
placeholder = "Requerido para HTTPS"

[init_base_dir]
title = "DIRECTORIO BASE"
description = "Ruta raíz:"
placeholder = "Enter para: "

[init_models_dir]
title = "MODELOS OLLAMA"
description = "¿Ubicación de modelos?"

[init_gpu]
