[stop]
title = "Detener Búnker"
subtitle = "Apagando el contenedor sin borrar datos."
footer = "El entorno sigue intacto y puedes volver a abrirlo con axiom create."

[delete]
title = "Eliminar Búnker"
subtitle = "Se eliminará el contenedor y podrás decidir si también borrar el código."
footer = "ADVERTENCIA: Esta acción es irreversible."

[delete-image]
title = "Eliminar Imagen Base"
subtitle = "Se eliminará la imagen de Podman asociada a tu GPU."
footer = "Los búnkeres que la usen no podrán ser recreados hasta que ejecutes 'axiom build'."

[reset]
title = "Reset Total del Sistema"
subtitle = "Esto eliminará TODOS los búnkeres, sus entornos locales y la imagen base."
footer = "ADVERTENCIA: Esta acción no se puede deshacer."

[rebuild]
title = "Reconstruir Imagen Base"
subtitle = "Se eliminará la imagen actual y se lanzará un nuevo build."
footer = "Los búnkeres existentes NO se verán afectados."

[prune]
title = "Limpiar Entornos Huérfanos"
subtitle = "Se detectaron directorios en .entorno/ sin contenedor asociado."
footer = "¿Deseas eliminarlos para liberar espacio?"

[info]
title = "Información del Búnker"
subtitle = "Ficha técnica detallada"
footer = "Usa axiom delete para eliminar o axiom create para entrar."

[help]
title = "AXIOM Help"
subtitle = "Comandos disponibles del búnker."
footer = "axiom list ya muestra estado, imagen base, GPU y rutas clave de cada búnker."
item_1 = "Si no pasas nombre en axiom delete, se abre un selector con flechas."
item_2 = "Al borrar un búnker puedes decidir si también se elimina el código del proyecto."
cmd_1 = "axiom build:Construye la imagen base con GPU y herramientas IA."
cmd_2 = "axiom list:Abre un selector con búsqueda y muestra la ficha del búnker."
cmd_3 = "axiom create <nombre>:Crea un nuevo búnker o entra en uno existente."
cmd_4 = "axiom stop:Abre el selector de búnkeres activos y detiene el que elijas."
cmd_5 = "axiom delete:Abre el selector de búnkeres y elimina el que elijas."
cmd_6 = "axiom delete-image:Elimina la imagen base activa."
cmd_7 = "axiom info:Muestra la ficha detallada de un búnker."
cmd_8 = "axiom prune:Limpia entornos huérfanos sin contenedor."
cmd_9 = "axiom rebuild:Reconstruye la imagen base."
cmd_10 = "axiom reset:Elimina TODOS los búnkeres e imágenes."

[bunker]
# Volume flags para creación de contenedores
volume_project = "--volume %s:/%s:z"
volume_ai_config = "--volume %s:/ai_config:z"
volume_config = "--volume %s:/run/axiom/env:ro,z"
volume_gpu_ro = "--volume %s:%s:ro"
volume_ssh = "--volume %s:%s"

# Formateo de bytes
bytes_format = "%d B"
bytes_format_decimal = "%.1f %cB"

# Nombre de imagen base
image_name = "localhost/axiom-%s:latest"

# Estado del búnker
status_stopped = "stopped"