# OS Preferences - Base Tools Configuration
# Este archivo define las herramientas base que se instalan automáticamente
# según el sistema operativo detectado. Estas herramientas NO aparecen en el wizard.

[arch]
name = "Arch Linux"
package_manager = "pacman"
base_tools = ["base-devel", "git", "curl"]
install_commands = [
    "sudo pacman -Syu --noconfirm",
    "sudo pacman -S --noconfirm base-devel git curl"
]

[ubuntu]
name = "Ubuntu/Debian"
package_manager = "apt"
base_tools = ["build-essential", "git", "curl"]
install_commands = [
    "sudo apt-get update",
    "sudo apt-get install -y build-essential git curl"
]

[macos]
name = "macOS"
package_manager = "brew"
base_tools = ["git", "curl"]
# brew se instala diferente, se maneja en código
install_commands = []

# Mapeo de herramientas requeridas a comandos de instalación por SO
[tools.npm]
arch = "sudo pacman -S --noconfirm nodejs npm"
ubuntu = "sudo apt-get install -y nodejs npm"
macos = "brew install node"

[tools.brew]
arch = ""  # No aplica, brew es específico de macOS
ubuntu = ""  # No aplica por defecto
macos = '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'

[tools.pip]
arch = "sudo pacman -S --noconfirm python-pip"
ubuntu = "sudo apt-get install -y python3-pip"
macos = "brew install python"

[tools.pipx]
arch = "sudo pacman -S --noconfirm pipx"
ubuntu = "sudo apt-get install -y pipx"
macos = "brew install pipx"

[tools.cargo]
arch = "sudo pacman -S --noconfirm rust"
ubuntu = "sudo apt-get install -y cargo"
macos = "brew install rust"
